server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # In EKS, "backend-service" resolves via cluster DNS.
        # In Docker (local test), name the backend container "backend-service"
        # and put both on the same network — Docker's embedded DNS handles the rest.
        proxy_pass         http://backend-service:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
        add_header Access-Control-Allow-Origin *;
    }
}
