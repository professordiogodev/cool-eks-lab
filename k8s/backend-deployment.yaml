apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # TODO: replace YOUR_REGISTRY with your ECR URI or DockerHub username
          # ECR format:  123456789.dkr.ecr.us-east-1.amazonaws.com/cloudpilot-backend:v1
          # DockerHub:   YOUR_DOCKERHUB_USERNAME/cloudpilot-backend:v1
          image: YOUR_REGISTRY/cloudpilot-backend:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            # Kubernetes Downward API — pod/node metadata injected at runtime
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # EKS nodes have AWS_REGION set in the node environment,
            # but we pass it explicitly so the app can report it.
            - name: AWS_REGION
              value: "us-east-1"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
