apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  annotations:
    # On EKS this creates a Classic Load Balancer by default.
    # Uncomment below to create a Network Load Balancer instead (faster, static IPs):
    # service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  # LoadBalancer = EKS automatically provisions an AWS Elastic Load Balancer.
  # AWS gives it a public DNS hostname — that's your app's internet address!
  type: LoadBalancer
